server:
  port: 8084

spring:
  application:
    name: inspection-service

  datasource:
    url: jdbc:mysql://localhost:3306/inspection_service_DB
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

    eureka:
      instance:
        hostname: localhost
        prefer-ip-address: true

      client:
        register-with-eureka: true
        fetch-registry: true
        service-url:
          defaultZone: http://localhost:8761/eureka/
