server:
  port: 8085   # choose a port different from other services

spring:
  application:
    name: security-service

  datasource:
    url: jdbc:mysql://localhost:3306/security_db?useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update  # use 'validate' or 'none' in production
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

# JWT configuration
jwt:
  secret: mySuperSecretKey12345678901234567890
  expiration: 3600000             # 1 hour in milliseconds

logging:
  level:
    root: INFO
    org.springframework.security: DEBUG

# Eureka client configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true