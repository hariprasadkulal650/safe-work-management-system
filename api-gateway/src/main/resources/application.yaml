server:
  port: 8081

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*" # Short and clean for testing
      routes:
        - id: employee-route
          uri: lb://EMPLOYEE-SERVICE
          predicates:
            - Path=/employees/**

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

# Monitoring (Optional)
management:
  endpoints:
    web:
      exposure:
        include: gateway